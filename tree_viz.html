
    <!DOCTYPE html>
    <html>
    <head>
        <title>Random Tree Visualization</title>
        <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
        <style type="text/css">
            #mynetwork { width: 100%; height: 90vh; border: 1px solid lightgray; }
            body { font-family: sans-serif; text-align: center; }
        </style>
    </head>
    <body>
        <h2>Tree Visualization (Root: 2)</h2>
        <div id="mynetwork"></div>
        <script type="text/javascript">
            var nodes = new vis.DataSet([
    { id: 1, label: '1', color: '#97c2fc' },
{ id: 2, label: '2', color: '#ff9999' },
{ id: 3, label: '3', color: '#97c2fc' },
{ id: 4, label: '4', color: '#97c2fc' },
]);
var edges = new vis.DataSet([
{ from: 1, to: 3 },
{ from: 1, to: 2 },
{ from: 3, to: 4 },

            ]);
            var container = document.getElementById('mynetwork');
            var data = { nodes: nodes, edges: edges };
            var options = {
                layout: {
                    hierarchical: {
                        enabled: true,
                        direction: "UD", // Up-Down
                        sortMethod: "directed"
                    }
                },
                edges: { smooth: false },
                physics: { stabilization: false }
            };
            var network = new vis.Network(container, data, options);
        </script>
    </body>
    </html>
